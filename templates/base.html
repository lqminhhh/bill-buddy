<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bill Buddy{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-row">
                <div>
                    <h1 class="site-title"><a href="{{ url_for('index') }}">Bill Buddy</a></h1>
                    <p class="site-tagline">Simple trip expense sharing for small groups.</p>
                </div>
                <nav class="site-nav">
                    <a class="button button-secondary" href="{{ url_for('index') }}">All Trips</a>
                    <a class="button" href="{{ url_for('create_trip') }}">New Trip</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
